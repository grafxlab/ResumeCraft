services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: jobs
      POSTGRES_PASSWORD: jobs
      POSTGRES_DB: jobs
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobs"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
